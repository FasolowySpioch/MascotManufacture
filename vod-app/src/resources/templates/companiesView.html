<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>VOD</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet" />
</head>

<body>

<header>
    <a href="./">
        <h1>Pix</h1>
    </a>

    <h2 th:text="${title}"></h2>

    <h3></h3>
</header>

<section>
    <table>

        <tr>
            <th>Logo</th>
            <th>Name</th>
            <th>Mascots</th>
        </tr>

        <tr th:each="c : ${companies}">
            <td>
                <img th:src="${c.logoUrl}" />
            </td>

            <td th:text="${c.name}"></td>

            <td class="search-container">
                <a class="search"
                   th:href="@{/mascots(companyId=${c.id})}">
                </a>
            </td>
        </tr>

    </table>
</section>

<div id="orders">
</div>

<footer th:text="${tip}"></footer>

</body>
</html>
