spring.application.name=vod-app
spring.messages.basename=messages
spring.datasource.url=jdbc:mysql://localhost:3306/vod
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=mysql

spring.jpa.show-sql=true
management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=*
###Profile below was needed for the app to start
spring.profiles.active=dev
info.app.name=${spring.application.name}
info.app.version =0.99
info.app.description=Application serving information about mascot and companies